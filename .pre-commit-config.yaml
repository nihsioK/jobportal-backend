repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - djangorestframework
          - django-filter
          - drf-spectacular
          - factory-boy
          - pytest
          - pytest-django
          - djangorestframework-simplejwt
          - dj-database-url
          - django-celery-beat
