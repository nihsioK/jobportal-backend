name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # Navigate to project directory (create if first deploy)
            PROJECT_DIR="/home/${{ secrets.SERVER_USER }}/jobportal-backend"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "First deploy — cloning repository..."
              git clone https://github.com/nihsioK/jobportal-backend.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # Pull latest changes
            echo "Pulling latest changes from main..."
            git fetch origin main
            git reset --hard origin/main

            # Build and restart containers
            echo "Building and starting containers..."
            docker compose down
            docker compose up -d --build

            # Run migrations inside the web container
            echo "Running migrations..."
            docker compose exec -T web python manage.py migrate --noinput

            # Verify containers are running
            echo "Verifying deployment..."
            docker compose ps

            echo "Deployment complete."
