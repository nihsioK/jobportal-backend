name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # --- Install Docker if not present ---
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
              echo "Docker installed successfully."
            else
              echo "Docker is already installed: $(docker --version)"
            fi

            # --- Project setup ---
            PROJECT_DIR="/home/${{ secrets.SERVER_USER }}/jobportal-backend"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "First deploy — cloning repository..."
              git clone https://github.com/nihsioK/jobportal-backend.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # Pull latest changes
            echo "Pulling latest changes from main..."
            git fetch origin main
            git reset --hard origin/main

            # Build and restart containers
            echo "Building and starting containers..."
            sudo docker compose down
            sudo docker compose up -d --build

            # Run migrations inside the web container
            echo "Running migrations..."
            sudo docker compose exec -T web python manage.py migrate --noinput

            # Verify containers are running
            echo "Verifying deployment..."
            sudo docker compose ps

            echo "Deployment complete."
